<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Redeem - Indigo Cloud</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #000000;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background-image: url('redeem_bg.png');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
    }
    .overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0, 0, 0, 0.6);
    }
    .container {
      position: relative;
      z-index: 1;
      max-width: 400px;
      width: 90%;
      padding: 40px 32px;
      background: rgba(10, 10, 10, 0.85);
      border: 1px solid #333;
      border-radius: 12px;
      text-align: center;
    }
    h1 {
      font-size: 1.4rem;
      color: #fff;
      margin-bottom: 24px;
      letter-spacing: 0.03em;
    }
    input {
      width: 100%;
      padding: 12px 16px;
      margin-bottom: 16px;
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 8px;
      color: #fff;
      font-size: 1rem;
      outline: none;
    }
    input::placeholder {
      color: #666;
    }
    input:focus {
      border-color: #7ab3ff;
    }
    button {
      width: 100%;
      padding: 14px;
      background: #7ab3ff;
      color: #000;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      margin-top: 4px;
    }
    button:hover {
      background: #5a9aef;
    }
    button:disabled {
      background: #333;
      color: #666;
      cursor: not-allowed;
    }
    .result {
      margin-top: 20px;
      font-size: 0.95rem;
      min-height: 24px;
    }
    .result.success { color: #7ab3ff; }
    .result.error { color: #ff6b6b; }
    footer {
      position: fixed;
      bottom: 0;
      left: 0; right: 0;
      text-align: center;
      padding: 16px;
      font-size: 0.75rem;
      color: #555;
      z-index: 1;
    }
    footer a {
      color: #666;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="overlay"></div>
  <div class="container">
    <h1>Redeem Code</h1>
    <input type="text" id="uid" placeholder="Player ID" autocomplete="off">
    <input type="text" id="code" placeholder="Coupon Code" autocomplete="off">
    <button id="submit" onclick="redeem()">Submit</button>
    <div class="result" id="result"></div>
  </div>
  <footer>
    <a href="index.html">&copy; 2026 SIGURE PTE. LTD.</a>
  </footer>

  <script>
    const FUNCTION_URL = "https://asia-southeast1-indigo-cloud-d05e2.cloudfunctions.net/redeemCoupon";

    async function redeem() {
      const uid = document.getElementById("uid").value.trim();
      const code = document.getElementById("code").value.trim().toUpperCase();
      const result = document.getElementById("result");
      const btn = document.getElementById("submit");

      if (!uid || !code) {
        result.className = "result error";
        result.textContent = "Please enter both Player ID and Coupon Code.";
        return;
      }

      btn.disabled = true;
      result.className = "result";
      result.textContent = "Processing...";

      try {
        const res = await fetch(FUNCTION_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ uid: uid, code: code })
        });
        const data = await res.json();
        if (data.success) {
          result.className = "result success";
          result.textContent = data.message || "Rewards have been added to your account!";
        } else {
          result.className = "result error";
          result.textContent = data.message || "Invalid code or Player ID.";
        }
      } catch (e) {
        result.className = "result error";
        result.textContent = "Connection error. Please try again.";
      }
      btn.disabled = false;
    }

    document.getElementById("code").addEventListener("keydown", function(e) {
      if (e.key === "Enter") redeem();
    });
  </script>
</body>
</html>
